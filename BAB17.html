  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Latihan Kosakata</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: white;
    padding: 30px;
    width: 400px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  input {
    width: 90%;
    padding: 8px;
    margin-top: 15px;
  }
  button {
    margin-top: 20px;
    padding: 8px 15px;
    cursor: pointer;
  }
  .result {
    font-size: 18px;
    font-weight: bold;
  }
  .wrong { color: red; }
  .correct { color: green; }
  ol { text-align:left; max-height:400px; overflow:auto; }
</style>
</head>
<body>

<div class="card">
  <h2 id="question"></h2>
  <input type="text" id="answerInput" placeholder="Tulis jawaban di sini">
  <br>
  <button id="nextBtn">Selanjutnya</button>
</div>

<script>
let questions = [
{ soal: "휴가", jawaban: "liburan" },
{ soal: "창덕궁", jawaban: "istana Changdeokgung" },
{ soal: "여행", jawaban: "wisata" },

{ soal: "보존 되어", jawaban: "dilestarikan" },

{ soal: "간축 양식", jawaban: "gaya arsitektur" },
{ soal: "여행을 계획 하다", jawaban: "merencanakan liburan" },
{ soal: "현대적인", jawaban: "zaman modern" },
{ soal: "표를 사다", jawaban: "membeli tiket" },
{ soal: "건축물", jawaban: "bangunan" },
{ soal: "속소를 예약하다", jawaban: "memesan penginapan" },
{ soal: "강", jawaban: "sungai" },
{ soal: "짐을 싸다", jawaban: "packing barang" },
{ soal: "호수", jawaban: "danau" },
{ soal: "출발하다", jawaban: "berangkat" },
{ soal: "바다", jawaban: "laut" },
{ soal: "도착하다", jawaban: "tiba" },
{ soal: "섬", jawaban: "pulau" },
{ soal: "짐을 풀다", jawaban: "membuka barang bawaan" },
{ soal: "온천", jawaban: "pemandian air hangat" },
{ soal: "묵다", jawaban: "tinggal" },
{ soal: "어우러져", jawaban: "menyatu" },
{ soal: "콘도", jawaban: "kondominium" },
{ soal: "더욱", jawaban: "bahkan lebih" },
{ soal: "호텔", jawaban: "hotel" },
{ soal: "옛날", jawaban: "dulu / masa lalu" },
{ soal: "민박", jawaban: "penginapan rumah" },
{ soal: "신라", jawaban: "kerajaan Silla" },
{ soal: "유스 호스텔", jawaban: "hotel pemuda" },
{ soal: "불국사", jawaban: "kuil Bulguksa" },
{ soal: "펜션", jawaban: "pondok penginapan" },
{ soal: "석굴암", jawaban: "gua Seokguram" },
{ soal: "유적지", jawaban: "situs sejarah" },
{ soal: "상징하다", jawaban: "melambangkan" },
{ soal: "민속촌", jawaban: "desa rakyat" },
{ soal: "예술적", jawaban: "artistik" },
{ soal: "놀이 공원", jawaban: "taman bermain" },
{ soal: "감각", jawaban: "rasa / estetis" },
{ soal: "해수욕장", jawaban: "pantai" },
{ soal: "엿 볼수 있다", jawaban: "bisa melihat sekilas" },

{ soal: "다보탑", jawaban: "pagoda Dabotap" },
{ soal: "구경하다", jawaban: "melihat-lihat" },

{ soal: "돌", jawaban: "batu" },
{ soal: "불상", jawaban: "patung Budha" },
{ soal: "오랜 역사", jawaban: "sejarah panjang" },
{ soal: "통하여", jawaban: "melalui" },
{ soal: "풍부 하다", jawaban: "kaya (akan sesuatu)" },
{ soal: "뛰어난", jawaban: "luar biasa" },
{ soal: "가진 나라", jawaban: "negara yang memiliki" },
{ soal: "기술", jawaban: "teknologi" },
{ soal: "수도인", jawaban: "ibu kota" },
{ soal: "뛰어난 기술", jawaban: "teknologi yang luar biasa" },
{ soal: "경복궁", jawaban: "istana Gyeongbokgung" },
{ soal: "관광객", jawaban: "wisatawan" },
];

// Acak soal
questions = questions.sort(() => Math.random() - 0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion() {
  questionEl.textContent = "Soal " + (index + 1) + ": " + questions[index].soal;
  answerInput.value = "";
  answerInput.focus();
}

nextBtn.addEventListener("click", () => {
  const userAnswer = answerInput.value.trim().toLowerCase();
  userAnswers[index] = userAnswer; // simpan jawaban sesuai index

  if (userAnswer === questions[index].jawaban) {
    score++;
  }

  index++;
  if (index < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
});

function showResult() {
  let answerList = "";
  questions.forEach((q, i) => {
    if (userAnswers[i] === q.jawaban) {
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    } else {
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
                     Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }
  });

  card.innerHTML = `
    <h2>Hasil</h2>
    <p class="result">Nilai: ${score} / ${questions.length}</p>
    <hr>
    <p>Kunci Jawaban:</p>
    <ol>${answerList}</ol>
  `;
}

showQuestion();
</script>
